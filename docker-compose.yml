version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: centro-controle-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: centro-controle
    volumes:
      - mongodb_data:/data/db
    networks:
      - centro-controle-network

  app:
    build: .
    container_name: centro-controle-app
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/centro-controle?authSource=admin
      JWT_SECRET: seu-segredo-jwt-super-seguro
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    depends_on:
      - mongodb
    networks:
      - centro-controle-network
    volumes:
      - ./logs:/app/logs

volumes:
  mongodb_data:

networks:
  centro-controle-network:
    driver: bridge
